    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>타임시트 - 시간 관리</title>
    <link rel="stylesheet" href="styles/foundation.css" />
    <link rel="stylesheet" href="styles/modal.css" />

  <body>
    <div class="container">
      <header>
        <div class="header-controls">
          <div class="header-top-row">
            <div class="date-selector">
              <label for="date">날짜:</label>
              <div class="date-navigation">
                <button id="prevDayBtn" class="nav-btn">◀</button>
                <button id="todayBtn" class="today-btn">오늘</button>
                <button id="nextDayBtn" class="nav-btn">▶</button>
              </div>
              <input type="date" id="date" name="date" />
            </div>
            <div class="auth-controls">
              <span id="authStatus" class="auth-status">로그인 필요</span>
              <button id="googleAuthBtn" type="button" class="auth-btn">Google 로그인</button>
            </div>
          </div>
        </div>
      </header>

      <main>
        <div class="timesheet">
          <div class="header-row">
            <div class="planned-label">
              <span class="planned-label-text">계획된 활동</span>
              <button id="plannedSlotMoveModeBtn" class="planned-slot-move-mode-btn" type="button" aria-pressed="false">슬롯 이동</button>
              <button id="plannedSlotClearModeBtn" class="planned-slot-clear-mode-btn" type="button" aria-pressed="false" style="pointer-events: auto;">슬롯 삭제</button>
            </div>
            <div class="time-label">시간</div>
          </div>

          <div class="time-entries" id="timeEntries">
            <!-- 시간대별 입력 필드들이 동적으로 생성됩니다 -->
          </div>

          <div class="summary">
            <div class="summary-row">
              <div class="summary-planned" id="totalPlanned">0시간</div>
              <div class="summary-label">합계</div>
            </div>
            <div class="analysis-row">
              <div class="analysis-label">분석</div>
              <div class="analysis-content" id="analysisContent">
                <div class="analysis-item">
                  <span class="analysis-metric">타이머 기록:</span>
                  <span class="analysis-value" id="timerUsage">0시간</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <div class="actions">
        <button id="clearBtn">초기화</button>
      </div>
    </div>

            window.NOTION_ACTIVITIES_ENDPOINT = '/api/notion/activities';
